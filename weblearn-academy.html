            content: `### 💫 Micro-Transitions & Interactive Hover States

Interaction feedback turns static pages into engaging interfaces. We achieve this with CSS pseudo-classes and transition properties.

#### 1. The CSS \`:hover\` Pseudo-class
You can write custom visual rules that activate immediately whenever a user cursor moves over any target tag:
\`\`\`css
.btn-submit {
  background-color: #dc2626; /* Deep Red standard color */
}
.btn-submit:hover {
  background-color: #b91c1c; /* Crimson color on hover status */
}
\`\`\`

#### 2. Smooth Transitions (\`transition\`)
Without transitions, states snap instantly. Applying transitions on the **original selector** properties forces background color, borders, and scale transformations to merge smoothly over time:
\`\`\`css
.btn-submit {
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
\`\`\``,

CSS is fantastic for pure visual styling, but JavaScript mouse event listeners let you calculate precise coordinate locations and dynamically manipulate elements in code.

#### 1. Listening to Hover Boundaries
JavaScript registers two core listeners to watch pointer behaviors:
- **\`mouseenter\`**: Dispatched as the user cursor breaks the container boundaries.
- **\`mouseleave\`**: Triggered the moment the cursor walks back outside.

\`\`\`javascript
const widget = document.querySelector('.card');
widget.addEventListener('mouseenter', () => {
  widget.style.backgroundColor = '#fee2e2'; // Light red highlight
});
\`\`\`

#### 2. Evaluating Active Coordinates (\`clientX\`, \`clientY\`)
\`\`\`javascript
card.addEventListener('mousemove', (event) => {
  const rect = card.getBoundingClientRect();
  const relativeX = event.clientX - rect.left;
});
\`\`\``,

                              <span className="text-[9px] px-2 py-0.5 font-mono font-bold bg-slate-100 border border-slate-200 text-slate-600 rounded uppercase">{course.id}</span>
                              <h4 className="text-base font-black text-slate-900">{course.title}</h4>
                            </div>
                            <p className="text-xs text-slate-500 leading-relaxed">{course.description}</p>
                          </div>

                          <div className="mt-6 pt-4 border-t border-slate-100 space-y-3">
                            <div className="flex justify-between items-center text-[11px] font-mono text-slate-400">
                              <span>PROGRESSION</span>
                              <span className="font-bold text-slate-700">{completionRatio}%</span>
                            </div>
                            <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                              <div className="bg-red-600 h-full transition-all" style={{ width: `${completionRatio}%` }} />
                            </div>

                            <button
                              onClick={() => { setSelectedTrack(course.id); setActiveTab("lessons"); }}
                              className="w-full py-2 bg-slate-50 hover:bg-slate-100 text-slate-700 text-xs font-bold font-mono transition rounded-lg border border-slate-200"
                            >
                              ENTER CURRICULUM
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Reset portal progress utility */}
                <div className="text-center pt-8 border-t border-slate-200">
                  <button onClick={resetAllProgress} className="text-slate-400 hover:text-red-600 text-[10px] font-mono font-bold hover:underline transition">
                    ⚠️ RESET PORTAL PROGRESSION METRICS
                  </button>
                </div>

              </div>
            )}

            {/* TAB 2: LESSONS & CURRICULUM PATH */}
            {activeTab === "lessons" && (
              <div className="space-y-6">
                {activeLesson ? (
                  // Focused Lesson unit inside the portal
                  <div className="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 space-y-6 shadow-sm">
                    <div className="flex justify-between items-center pb-4 border-b border-slate-100">
                      <button onClick={() => setActiveLesson(null)} className="flex items-center gap-2 text-xs md:text-sm text-slate-500 hover:text-red-655 font-bold transition">
                        <i data-lucide="arrow-left" className="h-4 w-4"></i>
                        Back to Unit Directory
                      </button>
                      <span className="text-xs font-mono font-semibold text-slate-400">UNIT RUNTIME PREPARED</span>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                      {/* Left: Course markdown representation */}
                      <div className="lg:col-span-2 space-y-6">
                        <h2 className="text-xl md:text-3xl font-black text-slate-900 tracking-tight">{activeLesson.title}</h2>
                        
                        <div className="prose text-sm text-slate-650 leading-relaxed whitespace-pre-wrap space-y-4">
                          {activeLesson.content}
                        </div>
                      </div>

                      {/* Right: Quick actions and lesson details */}
                      <div className="bg-slate-50 border border-slate-200 p-5 rounded-xl space-y-5 self-start">
                        <div className="space-y-1">
                          <span className="text-[10px] font-mono font-bold text-red-650 block uppercase tracking-wider">WORKSPACE SANDBOX</span>
                          <h4 className="text-xs font-bold text-slate-700 uppercase">Transfer Starter Code</h4>
                          <p className="text-xs text-slate-500 leading-relaxed">
                            Inject this lessons preset assets and code hooks directly inside your split sandbox framework.
                          </p>
                        </div>

                        <button
                          onClick={() => handlePresetInject(activeLesson.interactiveCode.html, activeLesson.interactiveCode.css, activeLesson.interactiveCode.js, activeLesson.title)}
                          className="w-full flex items-center justify-center gap-2 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold text-xs rounded-xl shadow-xs transition"
                        >
                          <i data-lucide="play" className="h-3.5 w-3.5 fill-white"></i>
                          RUN IN THE SANDBOX
                        </button>
                      </div>
                    </div>
                  </div>
                ) : (
                  // General List of tracks
                  <div className="space-y-6">
                    {/* Swapping filters row */}
                    <div className="flex border-b border-slate-200 overflow-x-auto">
                      {COURSES_DATA.map(course => (
                        <button
                          key={course.id}
                          onClick={() => setSelectedTrack(course.id)}
                          className={`px-5 py-3 text-xs md:text-sm font-bold tracking-tight border-b-2 shrink-0 transition-all ${
                            selectedTrack === course.id
                              ? "border-red-600 text-red-650 bg-red-50/50 font-extrabold"
                              : "border-transparent text-slate-500 hover:text-slate-900"
                          }`}
                        >
                          {course.title}
                        </button>
                      ))}
                    </div>

                    {/* Active Track banner */}
                    {(() => {
                      const track = COURSES_DATA.find(c => c.id === selectedTrack) || COURSES_DATA[0];
                      return (
                        <div className="space-y-6">
                          <div className="bg-white border border-slate-200 p-6 rounded-2xl shadow-xxs">
                            <span className="text-[9px] font-mono font-bold bg-slate-100 border border-slate-150 px-2 py-0.5 rounded text-slate-500 uppercase">TRAIL DIRECTORY</span>
                            <h2 className="text-xl font-black text-slate-900 mt-2">{track.title} Modules</h2>
                            <p className="text-xs text-slate-500 mt-1 max-w-xl">{track.description}</p>
                          </div>

                          {/* Lessons and code templates inside selected track */}
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {track.lessons.map((lesson, index) => {
                              const isRead = completedLessons.includes(lesson.id);
                              return (
                                <div
                                  key={lesson.id}
                                  onClick={() => handleLessonOpen(lesson)}
                                  className="bg-white border border-slate-200 hover:border-slate-300 p-5 rounded-xl cursor-pointer hover:shadow-xs transition"
                                >
                                  <div className="flex justify-between text-[11px] font-mono text-slate-400">
                                    <span>UNIT 0{index + 1}</span>
                                    <span className="font-bold uppercase text-red-600">{lesson.difficulty}</span>
                                  </div>
                                  <h4 className="text-sm font-bold text-slate-950 mt-2 hover:text-red-600 transition">{lesson.title}</h4>
                                  <p className="text-xs text-slate-500 mt-1.5 leading-relaxed">{lesson.shortDesc}</p>
                                  <div className="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between text-xs">
                                    <span className="font-mono text-[10px] text-slate-450 uppercase">TRAIL UNIT</span>
                                    {isRead ? (
                                      <span className="text-emerald-700 bg-emerald-50 border border-emerald-100 font-bold px-2 py-0.5 rounded font-sans flex items-center gap-1">
                                        Completed
                                      </span>
                                    ) : (
                                      <span className="text-red-650 font-bold font-mono">ENTER UNIT →</span>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>

                          {/* Track quiz unit section */}
                          {track.quizzes && track.quizzes.map(quiz => {
                            const isFinished = completedQuizzes.includes(quiz.id);
                            const answerResult = quizResults[quiz.id];

                            return (
                              <div key={quiz.id} className="bg-slate-50 border border-slate-200 p-6 rounded-2xl max-w-2xl space-y-4">
                                <span className="text-[9px] font-mono font-bold text-red-600 uppercase tracking-widest block">MASTER EVALUATION CHALLENGE</span>
                                <h4 className="text-sm font-bold text-slate-800">{quiz.question}</h4>
                                
                                <div className="space-y-2">
                                  {quiz.options.map(opt => {
                                    const selected = userAnswers[quiz.id] === opt;
                                    return (
                                      <button
                                        key={opt}
                                        onClick={() => { if(!isFinished) setUserAnswers(p => ({ ...p, [quiz.id]: opt })); }}
                                        disabled={isFinished}
                                        className={`w-full text-left px-4 py-3 text-xs md:text-sm rounded-lg border flex items-center justify-between select-none ${
                                          isFinished && quiz.correctAnswer === opt
                                            ? "bg-emerald-50 border-emerald-300 text-emerald-800 font-bold"
                                            : selected
                                            ? "bg-red-50 border-red-400 text-red-650"
                                            : "bg-white border-slate-200 hover:border-slate-300"
                                        }`}
                                      >
                                        <span>{opt}</span>
                                      </button>
                                    );
                                  })}
                                </div>

                                {!isFinished && (
                                  <button
                                    onClick={() => handleQuizSubmit(quiz.id, quiz.correctAnswer)}
                                    className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-bold font-mono text-xs rounded-lg shadow-sm transition"
                                  >
                                    VALIDATE ANSWER CHOICE
                                  </button>
                                )}

                                {answerResult && (
                                  <div className={`p-3 rounded-lg text-xs font-medium ${answerResult.success ? "bg-emerald-50 text-emerald-800 border-emerald-200":"bg-red-50 text-red-800 border-red-200"}`}>
                                    {answerResult.desc}
                                  </div>
                                )}
                              </div>
                            );
                          })}

                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>
            )}

            {/* TAB 3: STANDALONE PORTABLE WORKSPACE SANDBOX */}
            {activeTab === "playground" && (
              <div className="space-y-6">
                
                {/* Info and Selects panel */}
                <div className="bg-white border border-slate-200 p-4 rounded-xl flex flex-wrap items-center justify-between gap-4 shadow-xxs">
                  <div className="space-y-0.5">
                    <h2 className="text-sm font-extrabold text-slate-800">Dynamic Live Playground</h2>
                    <p className="text-xs text-slate-500">Active Template Code: <span className="font-mono text-red-600 font-bold uppercase">{activeTemplateName}</span></p>
                  </div>

                  {/* Preset Injectors */}
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] font-mono text-slate-400 uppercase font-semibold">LOAD SAMPLES:</span>
                    {[
                      { name: "Markup Footer", ref: COURSES_DATA[0].lessons[1] },
                      { name: "CSS Transitions", ref: COURSES_DATA[1].lessons[0] },
                      { name: "JS Coordinate Tracking", ref: COURSES_DATA[2].lessons[0] }
                    ].map(preset => (
                      <button
                        key={preset.name}
                        onClick={() => handlePresetInject(preset.ref.interactiveCode.html, preset.ref.interactiveCode.css, preset.ref.interactiveCode.js, preset.ref.title)}
                        className="px-2.5 py-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-[11px] font-semibold text-slate-600 rounded"
                      >
                        {preset.name}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Left/Right Split Workspace */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[70vh]">
                  
                  {/* Left panel: HTML/CSS/JS script writing container */}
                  <div className="flex flex-col bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-xs h-full">
                    
                    {/* Tab Selection */}
                    <div className="bg-slate-50 border-b border-slate-200 p-2 flex justify-between items-center">
                      <div className="flex gap-1.5 bg-slate-100 p-0.5 rounded-lg border border-slate-200">
                        {["html", "css", "js"].map(tab => (
                          <button
                            key={tab}
                            onClick={() => setSandboxTab(tab)}
                            className={`px-3 py-1 font-mono text-xs font-bold rounded-md uppercase transition-all ${
                              sandboxTab === tab ? "bg-white text-red-655 shadow-xxs":"text-slate-500 hover:text-slate-800"
                            }`}
                          >
                            {tab}
                          </button>
                        ))}
                      </div>

                      <button onClick={compileSandbox} className="px-3.5 py-1.5 bg-red-600 hover:bg-red-700 text-white font-mono font-bold text-xs rounded-lg transition shadow-xs flex items-center gap-1.5">
                        <i data-lucide="play" className="h-3 w-3 fill-white"></i>
                        COMPILE CODE
                      </button>
                    </div>

                    {/* Active Edit Area */}
                    <div className="flex-1 bg-slate-50 relative p-1">
                      {sandboxTab === "html" && (
                        <textarea
                          value={sandboxHtml}
                          onChange={e => setSandboxHtml(e.target.value)}
                          placeholder="<!-- Write HTML templates here -->"
                          className="w-full h-full bg-transparent text-slate-800 font-mono text-xs p-3 outline-none focus:ring-0 resize-none whitespace-pre select-text"
                          spellCheck={false}
                        />
                      )}
                      {sandboxTab === "css" && (
                        <textarea
                          value={sandboxCss}
                          onChange={e => setSandboxCss(e.target.value)}
                          placeholder="/* Style properties go here */"
                          className="w-full h-full bg-transparent text-slate-800 font-mono text-xs p-3 outline-none focus:ring-0 resize-none whitespace-pre select-text"
                          spellCheck={false}
                        />
                      )}
                      {sandboxTab === "js" && (
                        <textarea
                          value={sandboxJs}
                          onChange={e => setSandboxJs(e.target.value)}
                          placeholder="// Event controllers go here"
                          className="w-full h-full bg-transparent text-slate-800 font-mono text-xs p-3 outline-none focus:ring-0 resize-none whitespace-pre select-text"
                          spellCheck={false}
                        />
                      )}
                    </div>
                  </div>

                  {/* Right panel: Active preview simulation and sandbox optimizer */}
                  <div className="flex flex-col gap-4 h-full">
                    
                    {/* Preview Screen */}
                    <div className="flex-1 bg-white rounded-2xl border border-slate-200 overflow-hidden flex flex-col shadow-xs">
                      
                      {/* Browser simulated Header link info */}
                      <div className="bg-slate-50 px-4 py-2 border-b border-slate-200 flex items-center gap-1.5">
                        <div className="flex gap-1">
                          <span className="w-2.5 h-2.5 rounded-full bg-red-500" />
                          <span className="w-2.5 h-2.5 rounded-full bg-slate-300" />
                        </div>
                        <input
                          disabled
                          className="flex-1 bg-white border border-slate-205 py-0.5 px-3 rounded text-[10px] text-slate-400 font-mono"
                          value="academy-localhost://runner-framework.htm"
                        />
                      </div>

                      {/* Display Preview inside actual Sandbox node */}
                      <div className="flex-1 bg-white relative">
                        <iframe
                          title="Interactive sandbox compiler output frame"
                          srcDoc={iframeSrcDoc}
                          sandbox="allow-scripts"
                          className="w-full h-full border-none bg-white"
                        />
                      </div>
                    </div>

                    {/* AI Inspector controller */}
                    <div className="bg-white border border-slate-200 p-4.5 rounded-xl flex flex-col sm:flex-row justify-between items-center gap-4">
                      <div className="space-y-0.5">
                        <h4 className="text-xs font-black text-slate-850 uppercase tracking-wider flex items-center gap-1.5">
                          <i data-lucide="sparkles" className="h-4 w-4 text-red-500"></i>
                          Sandbox Optimization Review
                        </h4>
                        <p className="text-xs text-slate-500">Run immediate audits on image labels, transition ease tags, and layout scopes.</p>
                      </div>

                      <button
                        onClick={runClientAiReview}
                        disabled={isAnalyzing}
                        className="px-4 py-2.5 bg-red-650 hover:bg-red-700 disabled:bg-red-300 text-white font-bold font-mono text-xs rounded-xl shadow-xxs transition shrink-0"
                      >
                        {isAnalyzing ? "AUDITING NOW...":"RUN OPTIMIZER REVIEW"}
                      </button>
                    </div>

                  </div>
                </div>

                {/* Render Review feedback markup */}
                {aiFeedback && (
                  <div className="bg-white border border-red-250 p-6 rounded-2xl max-w-3xl space-y-4 animate-in slide-in-from-bottom duration-300 shadow-sm">
                    <div className="flex justify-between border-b border-slate-100 pb-3">
                      <h4 className="text-xs font-black text-red-650 flex items-center gap-1.5 uppercase font-mono tracking-wider">
                        <i data-lucide="sparkles" className="h-4 w-4"></i>
                        Code Quality Feedback Insights
                      </h4>
                      <button onClick={() => setAiFeedback("")} className="text-xs text-slate-400 hover:text-slate-800">Clear</button>
                    </div>
                    
                    <div className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap space-y-3">
                      {aiFeedback}
                    </div>
                  </div>
                )}

              </div>
            )}

            {/* TAB 4: ACADEMY CREDENTIAL STATUS */}
            {activeTab === "certificate" && (
              <div className="space-y-8">
                {completedLessons.length < 1 ? (
                  // Locked state
                  <div className="bg-white border border-slate-200 p-8 rounded-2xl text-center max-w-lg mx-auto space-y-5 shadow-xs">
                    <div className="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center text-red-650 mx-auto">
                      <i data-lucide="lock" className="h-8 w-8"></i>
                    </div>

                    <div className="space-y-1">
                      <h3 className="text-lg font-black text-slate-900 tracking-tight">Front-End Certification Locked</h3>
                      <p className="text-xs text-slate-500 leading-relaxed max-w-xs mx-auto">
                        Your official degree status is currently locked. Complete at least 1 course lesson track to immediately satisfy compiler benchmarks!
                      </p>
                    </div>

                    {/* Progress slider bar */}
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <div className="flex justify-between items-center text-[11px] font-mono text-slate-500 mb-1">
                        <span>COMPLETION:</span>
                        <span>{completedLessons.length} / 1 Lessons</span>
                      </div>
                      <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                        <div className="bg-gradient-to-r from-red-600 to-red-500 h-full transition-all" style={{ width: `${Math.min(100, completedLessons.length * 100)}%` }} />
                      </div>
                    </div>
                  </div>
                ) : (
                  // Unlocked printable template
                  <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    
                    {/* Controls alignment */}
                    <div className="lg:col-span-1 space-y-6">
                      <div className="space-y-1.5">
                        <h2 className="text-base font-black text-slate-900">Academic Seal</h2>
                        <p className="text-xs text-slate-500 leading-relaxed">Customize your full name to display on the printable verification sheet document.</p>
                      </div>

                      {/* Custom Input */}
                      <div className="bg-white p-4 rounded-xl border border-slate-200 space-y-2 shadow-xxs">
                        <label className="text-[10px] font-mono font-bold text-slate-400 block uppercase">Student Full Name</label>
                        <input
                          type="text"
                          value={userName}
                          onChange={e => setUserName(e.target.value)}
                          className="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-lg py-1.5 px-3 text-xs focus:ring-1 focus:ring-red-500 outline-none"
                        />
                      </div>

                      {/* Validate Hash */}
                      <div className="bg-white p-4 rounded-xl border border-slate-200 space-y-2 text-xs">
                        <span className="text-[10px] font-mono font-bold text-slate-400 block">CREDENTIAL VALUE</span>
                        <p className="font-mono font-bold text-red-600 break-all select-all">WLA-{userName.substring(0,3).toUpperCase()}-948194</p>
                      </div>

                      <button onClick={() => window.print()} className="w-full py-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg text-xs font-bold font-mono shadow-xxs transition flex items-center justify-center gap-1.5">
                        <i data-lucide="download" className="h-4 w-4"></i>
                        PRINT / SAVE PDF SHEET
                      </button>
                    </div>

                    {/* Master Document Canvas */}
                    <div className="lg:col-span-3">
                      <div className="bg-white border-8 border-double border-red-600 p-8 md:p-14 rounded-2xl relative text-center flex flex-col items-center space-y-10 shadow-sm print:border-red-600 print:text-black print:bg-white max-w-3xl mx-auto">
                        
                        <div className="space-y-2">
                          <i data-lucide="award" className="h-10 w-10 text-red-650 mx-auto"></i>
                          <h4 className="text-xs font-mono font-bold text-red-600 tracking-widest uppercase">WEBLEARN ACADEMY DEGREE</h4>
                        </div>

                        <div className="space-y-4">
                          <span className="text-xs text-slate-400 italic font-serif">This official portal certificate acknowledges that</span>
                          <h2 className="text-2xl md:text-4xl font-black font-serif text-slate-950 leading-snug italic px-4">{userName}</h2>
                          <p className="text-xs text-slate-600 max-w-xl leading-relaxed mx-auto">
                            has satisfy learning units in document architecture skeletons, semantic header boundaries, CSS grid adjustments, pseudo transitions, and live DOM coordinate calculations:
                          </p>
                          <h4 className="text-sm font-extrabold text-red-600 uppercase tracking-widest">Front-End Development Program</h4>
                        </div>

                        <div className="w-full border-t border-slate-200 pt-8 flex items-center justify-between text-xs max-w-xl">
                          <div className="text-left">
                            <span className="text-[10px] font-mono text-slate-400 block">ISSUE DATE</span>
                            <span className="font-bold text-slate-800">May 2026</span>
                          </div>

                          <div className="text-center flex flex-col items-center">
                            <i data-lucide="shield-check" className="h-6 w-6 text-red-650 mb-0.5"></i>
                            <span className="text-[9px] font-mono font-bold text-red-650">SEAL VERIFIED</span>
                          </div>

                          <div className="text-right">
                            <span className="text-[10px] font-mono text-slate-400 block">SIGNATURE</span>
                            <span className="font-serif italic font-bold text-slate-800">Academy Board</span>
                          </div>
                        </div>

                      </div>
                    </div>

                  </div>
                )}
              </div>
            )}

          </main>

          {/* Site footer */}
          <footer className="bg-slate-50 border-t border-slate-200 py-6 text-center text-xs text-slate-400">
            <p>© 2026 WebLearn Academy. Built for seamless Google Sites Embeds.</p>
          </footer>

        </div>
      );
    }

    // Mount to root node
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
